{% extends "base.html" %}

{% block content %}

<h1>Movies</h1>

<ul class="movie-list">

    {% for movie in movies %}
        <li class="movie-entry">

            <div style="display:flex; gap:15px; align-items:center;">

                {% if movie.poster_url %}
                    <img src="{{ movie.poster_url }}" width="100">
                {% endif %}

                <div>
                    <h3>{{ movie.name }}</h3>
                </div>

            </div>

            <form action="{{ url_for('update_movie', user_id=user_id, movie_id=movie.id) }}" method="post">
                <input type="text" name="title" placeholder="New title">
                <button type="submit">Update</button>
            </form>

            <form action="{{ url_for('delete_movie', user_id=user_id, movie_id=movie.id) }}" method="post">
                <button type="submit">Delete</button>
            </form>

        </li>
    {% endfor %}

</ul>

<h2>Add Movie</h2>

<form method="post" action="{{ url_for('add_movie', user_id=user_id) }}">
    <input type="text" name="title" placeholder="Movie title">
    <button type="submit">Add</button>
</form>

<a class="btn" href="{{ url_for('index') }}">← Back</a>

{% endblock %}
